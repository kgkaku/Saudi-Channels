name: Refresh
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  update-streams:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Decode main.py
        env:
          SCRIPT_B64: ${{ secrets.MAIN_PY_BASE64 }}
        run: |
          echo "$SCRIPT_B64" | base64 -d > main.py
          chmod +x main.py
          echo "✅ main.py created successfully!"
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: pip install requests
        
      - name: Run stream collector
        run: python main.py
        
      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add output.m3u output.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Update streams: $(date -u +'%Y-%m-%d %H:%M:%S')"
          git push
